services:
  - type: web
    name: crm-clear-agro-review
    runtime: python
    plan: free
    region: oregon
    healthCheckPath: /_stcore/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: CRM_PUBLIC_REVIEW
        value: "false"
      - key: CRM_PROFILE
        value: "director"
      - key: APP_BUILD
        value: "render-public-review-2026-03-23"
      - key: CRM_DATABASE_URL
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_PROJECT_REF
        sync: false
      - key: SUPABASE_ACCESS_TOKEN
        sync: false
      - key: SUPABASE_TOKEN_PATH
        value: ""
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      - key: STREAMLIT_BROWSER_GATHER_USAGE_STATS
        value: "false"
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON_B64
        sync: false
      - key: GOOGLE_SHEETS_SPREADSHEET_ID
        sync: false
      - key: GOOGLE_SHEETS_TARGETS_SHEET
        value: "metas"
      - key: GOOGLE_SHEETS_TARGETS_RANGE
        value: "A:O"
    buildCommand: python -m pip install --upgrade pip && pip install -r requirements.txt
    startCommand: streamlit run app/main.py --server.address 0.0.0.0 --server.port $PORT --server.headless true
    autoDeploy: true
  - type: web
    name: finance-clear-agro-review
    runtime: python
    plan: free
    region: oregon
    healthCheckPath: /_stcore/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: APP_BUILD
        value: "render-finance-review-2026-04-14-incremental"
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      - key: STREAMLIT_BROWSER_GATHER_USAGE_STATS
        value: "false"
    buildCommand: python -m pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python 02_financeiro/dashboard_online/build_snapshot.py && streamlit run 02_financeiro/dashboard_online/app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true
    autoDeploy: true
  - type: web
    name: codex-usage-monitor
    runtime: static
    rootDir: docs/codex-monitor
    buildCommand: ""
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    autoDeploy: true
